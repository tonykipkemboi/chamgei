name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build the CLI binary for macOS (aarch64 + x86_64)
  # ---------------------------------------------------------------------------
  build-cli:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: aarch64
            target: aarch64-apple-darwin
          - runner: macos-14
            arch: x86_64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-release-

      - name: Build CLI binary
        run: cargo build --release -p rekody-core --target ${{ matrix.target }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package CLI binary
        run: |
          mkdir -p dist
          PKGDIR=$(mktemp -d)
          cp target/${{ matrix.target }}/release/rekody "$PKGDIR/rekody"
          tar -czf "dist/rekody-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz" -C "$PKGDIR" .
          rm -rf "$PKGDIR"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-${{ matrix.arch }}
          path: dist/rekody-*.tar.gz

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all artifacts
  # ---------------------------------------------------------------------------
  create-release:
    needs: [build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Generate SHA256SUMS
        working-directory: release-assets
        run: |
          shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Update Homebrew tap formula with new version + checksums
  # ---------------------------------------------------------------------------
  update-homebrew-tap:
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch SHA256SUMS from release
        id: sums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SUMS=$(curl -fsSL "https://github.com/tonykipkemboi/rekody/releases/download/v${VERSION}/SHA256SUMS")
          SHA_AARCH64=$(echo "$SUMS" | grep "macos-aarch64" | awk '{print $1}')
          SHA_X86_64=$(echo  "$SUMS" | grep "macos-x86_64"  | awk '{print $1}')
          echo "sha_aarch64=$SHA_AARCH64" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64=$SHA_X86_64"   >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: tonykipkemboi/homebrew-rekody
          token: ${{ secrets.PAT_HOMEBREW }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_AARCH64="${{ steps.sums.outputs.sha_aarch64 }}"
          SHA_X86_64="${{ steps.sums.outputs.sha_x86_64 }}"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" tap/Formula/rekody.rb
          sed -i "/macos-aarch64/{ n; s/sha256 \".*\"/sha256 \"${SHA_AARCH64}\"/ }" tap/Formula/rekody.rb
          sed -i "/macos-x86_64/{  n; s/sha256 \".*\"/sha256 \"${SHA_X86_64}\"/ }"  tap/Formula/rekody.rb

          cat tap/Formula/rekody.rb

      - name: Commit and push formula update
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rekody.rb
          git diff --staged --quiet || git commit -m "chore: update rekody to v${{ steps.version.outputs.version }}"
          git push
