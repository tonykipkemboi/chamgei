# rekody — Default Configuration
# Copy to ~/.config/rekody/config.toml and customize.

# Hotkey activation mode: "push_to_talk" or "toggle"
activation_mode = "push_to_talk"

# Whisper model size: "tiny", "small", "medium", "large"
whisper_model = "tiny"

# VAD sensitivity — RMS energy above this = speech.
# Lower = more sensitive. 0.01 works well for most mics.
vad_threshold = 0.01

# Text injection method: "clipboard" or "native"
injection_method = "clipboard"

# ─── Speech-to-Text Engine ──────────────────────────────────
# "local"    = on-device Whisper (default, private)
# "groq"     = Groq cloud Whisper (fastest, uses groq_api_key)
# "deepgram" = Deepgram Nova-3 (most accurate, needs deepgram_api_key)
# "cohere"   = Local Cohere transcription server (needs cohere_stt_port)
stt_engine = "local"
# deepgram_api_key = ""              # Get yours at console.deepgram.com
# cohere_stt_port = 8099             # Port for local Cohere STT server

# Language for transcription (BCP-47 code, e.g. "en", "sw", "fr", "es").
# Omit or leave commented to enable auto-detection:
#   - deepgram: uses language=multi (Nova-3 real-time multilingual, 100+ languages)
#   - groq:     language field omitted (Whisper auto-detects)
#   - local:    set_language(None) — requires the multilingual model file
#               (ggml-tiny.bin, not ggml-tiny.en.bin — download from HuggingFace)
# Pinning to a specific language is slightly faster and more accurate when known.
# stt_language = "en"

# ─── LLM Providers ──────────────────────────────────────────
# Providers are tried in order. If the first fails, it falls
# back to the next. You can list as many as you want.
#
# Supported preset names (auto-resolve base URL):
#   groq, cerebras, together, openrouter, fireworks, openai,
#   anthropic, gemini, ollama, lm-studio, vllm
#
# For any other provider, set name = "custom" and provide base_url.

[[providers]]
name = "groq"
api_key = ""                          # Get yours at console.groq.com
model = "openai/gpt-oss-20b"

